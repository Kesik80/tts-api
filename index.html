<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modalverben — Deutsche Grammatik</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1209;
  --paper: #f5f0e8;
  --cream: #ede8dc;
  --gold: #b8892a;
  --gold2: #d4a843;
  --rust: #8b3a1e;
  --sage: #3d5a47;
  --line: rgba(26,18,9,0.12);
  --shadow: rgba(26,18,9,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Texture overlay */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* Header */
header {
  position: relative; z-index: 1;
  border-bottom: 2px solid var(--ink);
  padding: clamp(1.2rem, 4vw, 2rem) clamp(1rem, 4vw, 2rem) 1.2rem;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem;
  flex-wrap: wrap;
}
.header-left h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 6vw, 3.5rem);
  line-height: 1;
  letter-spacing: -0.02em;
}
.header-left h1 em {
  font-style: italic;
  color: var(--gold);
}
.header-sub {
  font-size: 0.68rem;
  color: rgba(26,18,9,0.45);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 0.4rem;
}
.voice-panel {
  display: flex; align-items: center; gap: 0.6rem;
  background: var(--cream);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 0.6rem 1rem;
  font-size: 0.8rem;
}
.voice-label { color: rgba(26,18,9,0.45); white-space: nowrap; font-size: 0.75rem; }
#voice-select {
  background: none; border: none; outline: none;
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem; color: var(--ink); cursor: pointer;
  font-weight: 500;
}
#voice-select option { background: var(--paper); }

/* Verb tabs */
.verb-nav {
  position: sticky; top: 0; z-index: 5;
  background: var(--paper);
  display: flex; gap: 0;
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0 clamp(1rem, 4vw, 2rem);
  box-shadow: 0 2px 12px rgba(26,18,9,0.06);
}
.verb-nav::-webkit-scrollbar { display: none; }
.verb-tab {
  flex-shrink: 0;
  background: none; border: none;
  font-family: 'DM Mono', monospace;
  font-size: clamp(0.78rem, 2.2vw, 0.9rem); font-weight: 500;
  color: rgba(26,18,9,0.4);
  padding: 1rem clamp(0.8rem, 2.5vw, 1.4rem);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.18s;
  letter-spacing: 0.04em;
}
.verb-tab:hover { color: var(--ink); }
.verb-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* Main layout */
main {
  position: relative; z-index: 1;
  max-width: 900px; margin: 0 auto;
  padding: clamp(1rem, 4vw, 2rem);
}

/* Verb info */
.verb-info {
  display: none;
  animation: fadeUp 0.3s ease both;
}
.verb-info.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.verb-header {
  display: flex; align-items: baseline; gap: 1.5rem;
  margin-bottom: 0.4rem; flex-wrap: wrap;
}
.verb-name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.8rem, 10vw, 4.5rem);
  font-weight: 700;
  line-height: 1;
  color: var(--ink);
}
.verb-meaning {
  font-size: clamp(0.85rem, 2.5vw, 1rem);
  color: rgba(26,18,9,0.55);
  font-style: italic;
}
.verb-desc {
  font-size: clamp(0.75rem, 2vw, 0.85rem);
  color: rgba(26,18,9,0.55);
  margin-bottom: 2rem;
  line-height: 1.7;
  max-width: 520px;
}

/* Tense sections */
.tenses { display: grid; gap: 1.5rem; }

.tense-block {
  background: var(--cream);
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
}
.tense-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.9rem 1.2rem;
  border-bottom: 1px solid var(--line);
  background: rgba(26,18,9,0.03);
}
.tense-name {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(26,18,9,0.5);
}
.tense-de {
  font-family: 'Playfair Display', serif;
  font-size: clamp(0.85rem, 2.5vw, 1rem);
  color: var(--gold);
  font-style: italic;
}

/* Forms grid */
.forms-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}
.form-row {
  display: flex; align-items: center;
  padding: clamp(0.75rem, 2vw, 1rem) 1.2rem;
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line);
  gap: 0.8rem;
  transition: background 0.12s;
  min-height: 58px;
}
.form-row:hover { background: rgba(184,137,42,0.04); }
.pronoun {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--gold);
  min-width: 52px;
  letter-spacing: 0.03em;
  flex-shrink: 0;
}
.form-de {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.1rem, 3.5vw, 1.3rem);
  color: var(--ink);
  flex: 1;
}
.form-ru {
  font-size: 0.72rem;
  color: rgba(26,18,9,0.45);
  text-align: right;
  max-width: 140px;
}

/* Example sentence */
.example-block {
  padding: 1rem 1.2rem;
  background: rgba(61,90,71,0.06);
  border-top: 1px solid rgba(61,90,71,0.15);
  display: flex; align-items: center; gap: 1rem;
}
.example-text { flex: 1; }
.example-de {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1rem, 3vw, 1.1rem);
  color: var(--sage);
  line-height: 1.4;
}
.example-ru {
  font-size: 0.75rem;
  color: rgba(26,18,9,0.45);
  margin-top: 0.3rem;
}

/* Speak button — large, visible */
.speak-btn {
  flex-shrink: 0;
  background: var(--gold);
  border: none;
  border-radius: 10px;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 1.1rem;
  color: #fff;
  transition: all 0.15s;
  box-shadow: 0 2px 8px rgba(184,137,42,0.3);
}
.speak-btn:hover { background: var(--gold2); transform: scale(1.05); }
.speak-btn:active { transform: scale(0.96); }
.speak-btn.loading { opacity: 0.45; cursor: wait; }
.speak-btn.playing {
  background: var(--sage);
  animation: speakPulse 0.5s ease-in-out infinite alternate;
}
@keyframes speakPulse {
  from { box-shadow: 0 0 0 0 rgba(61,90,71,0.4); }
  to   { box-shadow: 0 0 0 10px rgba(61,90,71,0); }
}

/* Form speak btn — visible pill */
.form-speak {
  flex-shrink: 0;
  background: var(--cream);
  border: 1px solid rgba(184,137,42,0.25);
  color: var(--gold);
  cursor: pointer;
  width: 36px; height: 36px;
  border-radius: 8px;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}
.form-speak:hover { background: var(--gold); color: #fff; border-color: var(--gold); }
.form-speak:active { transform: scale(0.94); }
.form-speak.playing { background: var(--sage); color: #fff; border-color: var(--sage); }
.form-speak.loading { opacity: 0.4; cursor: wait; }

/* Status bar */
.status-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  background: var(--ink); color: var(--paper);
  font-size: 0.68rem; letter-spacing: 0.06em;
  padding: 0.6rem 1.5rem;
  display: flex; align-items: center; gap: 0.8rem;
  transform: translateY(100%);
  transition: transform 0.25s ease;
}
.status-bar.show { transform: translateY(0); }
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold2);
  animation: blink 1s ease-in-out infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
<script src="https://tts-api-hazel.vercel.app/tts-widget.js"></script>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Modal<em>verben</em></h1>
    <div class="header-sub">Deutsche Grammatik · Изучение модальных глаголов</div>
  </div>
  <div class="voice-panel">
    <span class="voice-label">🔊 Голос:</span>
    <select id="voice-select"></select>
    <!-- голоса заполняются автоматически через tts-widget.js -->
  </div>
</header>

<nav class="verb-nav" id="verb-nav"></nav>

<main>
  <div id="verb-panels"></div>
</main>

<div class="status-bar" id="status-bar">
  <div class="status-dot"></div>
  <span id="status-text">Загрузка...</span>
</div>

<script>
// ── TTS — 3 строки ───────────────────────────────────────────
// tts-widget.js уже содержит все настройки

// ── Данные ───────────────────────────────────────────────────
const PRONOUNS = ['ich','du','er/sie/es','wir','ihr','sie/Sie'];

const verbs = [
  {
    id: 'können',
    meaning: 'мочь, уметь',
    desc: 'Выражает физическую или умственную способность, возможность, разрешение',
    tenses: [
      {
        name: 'Präsens', de: 'настоящее время',
        forms: ['kann','kannst','kann','können','könnt','können'],
        example: { de: 'Ich kann gut Deutsch sprechen.', ru: 'Я умею хорошо говорить по-немецки.' },
      },
      {
        name: 'Präteritum', de: 'простое прошедшее',
        forms: ['konnte','konntest','konnte','konnten','konntet','konnten'],
        example: { de: 'Er konnte gestern nicht kommen.', ru: 'Вчера он не мог прийти.' },
      },
      {
        name: 'Futur I', de: 'будущее время',
        forms: ['werde können','wirst können','wird können','werden können','werdet können','werden können'],
        example: { de: 'Sie werden das bald können.', ru: 'Скоро они смогут это сделать.' },
      },
      {
        name: 'Perfekt', de: 'разговорное прошедшее',
        forms: ['habe gekonnt','hast gekonnt','hat gekonnt','haben gekonnt','habt gekonnt','haben gekonnt'],
        example: { de: 'Ich habe das nie gekonnt.', ru: 'Я никогда этого не умел.' },
      },
    ],
  },
  {
    id: 'müssen',
    meaning: 'должен, нужно',
    desc: 'Выражает необходимость, обязанность или логическую вынужденность',
    tenses: [
      {
        name: 'Präsens', de: 'настоящее время',
        forms: ['muss','musst','muss','müssen','müsst','müssen'],
        example: { de: 'Du musst jetzt lernen.', ru: 'Тебе нужно учиться сейчас.' },
      },
      {
        name: 'Präteritum', de: 'простое прошедшее',
        forms: ['musste','musstest','musste','mussten','musstet','mussten'],
        example: { de: 'Wir mussten früh aufstehen.', ru: 'Нам пришлось рано вставать.' },
      },
      {
        name: 'Futur I', de: 'будущее время',
        forms: ['werde müssen','wirst müssen','wird müssen','werden müssen','werdet müssen','werden müssen'],
        example: { de: 'Du wirst mehr üben müssen.', ru: 'Тебе придётся больше практиковаться.' },
      },
      {
        name: 'Perfekt', de: 'разговорное прошедшее',
        forms: ['habe gemusst','hast gemusst','hat gemusst','haben gemusst','habt gemusst','haben gemusst'],
        example: { de: 'Ich habe das leider gemusst.', ru: 'К сожалению, мне пришлось это сделать.' },
      },
    ],
  },
  {
    id: 'wollen',
    meaning: 'хотеть',
    desc: 'Выражает намерение или желание субъекта',
    tenses: [
      {
        name: 'Präsens', de: 'настоящее время',
        forms: ['will','willst','will','wollen','wollt','wollen'],
        example: { de: 'Ich will Deutsch lernen.', ru: 'Я хочу учить немецкий.' },
      },
      {
        name: 'Präteritum', de: 'простое прошедшее',
        forms: ['wollte','wolltest','wollte','wollten','wolltet','wollten'],
        example: { de: 'Sie wollte Ärztin werden.', ru: 'Она хотела стать врачом.' },
      },
      {
        name: 'Futur I', de: 'будущее время',
        forms: ['werde wollen','wirst wollen','wird wollen','werden wollen','werdet wollen','werden wollen'],
        example: { de: 'Er wird das nicht wollen.', ru: 'Он не захочет этого.' },
      },
      {
        name: 'Perfekt', de: 'разговорное прошедшее',
        forms: ['habe gewollt','hast gewollt','hat gewollt','haben gewollt','habt gewollt','haben gewollt'],
        example: { de: 'Das habe ich nie gewollt.', ru: 'Я никогда этого не хотел.' },
      },
    ],
  },
  {
    id: 'dürfen',
    meaning: 'сметь, иметь право',
    desc: 'Выражает разрешение или запрет (с отрицанием)',
    tenses: [
      {
        name: 'Präsens', de: 'настоящее время',
        forms: ['darf','darfst','darf','dürfen','dürft','dürfen'],
        example: { de: 'Hier darf man nicht rauchen.', ru: 'Здесь нельзя курить.' },
      },
      {
        name: 'Präteritum', de: 'простое прошедшее',
        forms: ['durfte','durftest','durfte','durften','durftet','durften'],
        example: { de: 'Als Kind durfte ich lange aufbleiben.', ru: 'В детстве мне разрешали поздно ложиться.' },
      },
      {
        name: 'Futur I', de: 'будущее время',
        forms: ['werde dürfen','wirst dürfen','wird dürfen','werden dürfen','werdet dürfen','werden dürfen'],
        example: { de: 'Du wirst das nicht dürfen.', ru: 'Тебе это не будет разрешено.' },
      },
      {
        name: 'Perfekt', de: 'разговорное прошедшее',
        forms: ['habe gedurft','hast gedurft','hat gedurft','haben gedurft','habt gedurft','haben gedurft'],
        example: { de: 'Das habe ich nicht gedurft.', ru: 'Мне это не было позволено.' },
      },
    ],
  },
  {
    id: 'sollen',
    meaning: 'должен (по чужой воле)',
    desc: 'Выражает обязанность, поручение или утверждение со стороны третьего лица',
    tenses: [
      {
        name: 'Präsens', de: 'настоящее время',
        forms: ['soll','sollst','soll','sollen','sollt','sollen'],
        example: { de: 'Du sollst die Wahrheit sagen.', ru: 'Ты должен говорить правду.' },
      },
      {
        name: 'Präteritum', de: 'простое прошедшее',
        forms: ['sollte','solltest','sollte','sollten','solltet','sollten'],
        example: { de: 'Ich sollte früher kommen.', ru: 'Мне было велено прийти раньше.' },
      },
      {
        name: 'Futur I', de: 'будущее время',
        forms: ['werde sollen','wirst sollen','wird sollen','werden sollen','werdet sollen','werden sollen'],
        example: { de: 'Er wird das erledigen sollen.', ru: 'Ему поручат это сделать.' },
      },
      {
        name: 'Perfekt', de: 'разговорное прошедшее',
        forms: ['habe gesollt','hast gesollt','hat gesollt','haben gesollt','habt gesollt','haben gesollt'],
        example: { de: 'Das habe ich nie gesollt.', ru: 'Этого от меня никогда не требовали.' },
      },
    ],
  },
  {
    id: 'mögen',
    meaning: 'нравиться, любить',
    desc: 'Выражает симпатию, предпочтение; в Konjunktiv II — вежливое желание (möchte)',
    tenses: [
      {
        name: 'Präsens', de: 'настоящее время',
        forms: ['mag','magst','mag','mögen','mögt','mögen'],
        example: { de: 'Ich mag klassische Musik sehr.', ru: 'Я очень люблю классическую музыку.' },
      },
      {
        name: 'Konjunktiv II (möchte)', de: 'вежливое желание',
        forms: ['möchte','möchtest','möchte','möchten','möchtet','möchten'],
        example: { de: 'Ich möchte einen Kaffee, bitte.', ru: 'Я бы хотел кофе, пожалуйста.' },
      },
      {
        name: 'Präteritum', de: 'простое прошедшее',
        forms: ['mochte','mochtest','mochte','mochten','mochtet','mochten'],
        example: { de: 'Er mochte keinen Spinat als Kind.', ru: 'В детстве он не любил шпинат.' },
      },
      {
        name: 'Perfekt', de: 'разговорное прошедшее',
        forms: ['habe gemocht','hast gemocht','hat gemocht','haben gemocht','habt gemocht','haben gemocht'],
        example: { de: 'Das habe ich schon immer gemocht.', ru: 'Это мне всегда нравилось.' },
      },
    ],
  },
];

// ── Build UI ─────────────────────────────────────────────────
function buildUI() {
  const nav    = document.getElementById('verb-nav');
  const panels = document.getElementById('verb-panels');

  verbs.forEach((verb, vi) => {
    // Tab
    const tab = document.createElement('button');
    tab.className = 'verb-tab' + (vi === 0 ? ' active' : '');
    tab.textContent = verb.id;
    tab.onclick = () => showVerb(verb.id);
    nav.appendChild(tab);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'verb-info' + (vi === 0 ? ' active' : '');
    panel.id = 'verb-' + verb.id;

    let html = `
      <div class="verb-header">
        <div class="verb-name">${verb.id}</div>
        <div class="verb-meaning">${verb.meaning}</div>
      </div>
      <div class="verb-desc">${verb.desc}</div>
      <div class="tenses">`;

    verb.tenses.forEach(tense => {
      html += `
        <div class="tense-block">
          <div class="tense-header">
            <span class="tense-name">${tense.name}</span>
            <span class="tense-de">${tense.de}</span>
          </div>
          <div class="forms-grid">`;

      PRONOUNS.forEach((pro, i) => {
        const form = tense.forms[i];
        const fullText = `${pro} ${form}`;
        html += `
            <div class="form-row">
              <span class="pronoun">${pro}</span>
              <span class="form-de">${form}</span>
              <button class="form-speak" data-tts="${fullText}">🔊</button>
            </div>`;
      });

      html += `</div>
          <div class="example-block">
            <div class="example-text">
              <div class="example-de">${tense.example.de}</div>
              <div class="example-ru">${tense.example.ru}</div>
            </div>
            <button class="speak-btn" data-tts="${tense.example.de}">🔊</button>
          </div>
        </div>`;
    });

    html += `</div>`;
    panel.innerHTML = html;
    panels.appendChild(panel);
  });
}

function showVerb(id) {
  document.querySelectorAll('.verb-tab').forEach(t =>
    t.classList.toggle('active', t.textContent === id));
  document.querySelectorAll('.verb-info').forEach(p =>
    p.classList.toggle('active', p.id === 'verb-' + id));
}



buildUI();
// Навешиваем озвучку на все кнопки одной строкой
TTS.attachTo('[data-tts]');
</script>
<script src="console.js"></script>
</body>
</html>
